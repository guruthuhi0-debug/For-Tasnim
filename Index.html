<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Tasnim ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
}

/* PAGE STYLING */
.page{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:absolute;
top:0;
left:0;
transition:1s;
}

/* PAGE 1 */
#page1{
background:linear-gradient(135deg,#ffdde1,#ee9ca7);
text-align:center;
}

h1{
font-size:3rem;
color:#fff;
margin-bottom:20px;
}

.chibi{
font-size:120px;
animation:bounce 2s infinite;
}

@keyframes bounce{
50%{transform:translateY(-15px);}
}

.buttons{
margin-top:30px;
}

button{
padding:15px 35px;
border:none;
border-radius:50px;
font-size:20px;
cursor:pointer;
margin:10px;
transition:.3s;
}

#yesBtn{
background:#ff4d6d;
color:white;
}

#noBtn{
background:white;
color:#ff4d6d;
}

/* PAGE 2 */
#page2{
background:linear-gradient(to bottom,#2d0b0b,#5e0f0f);
display:none;
overflow:auto;
padding:40px;
}

.letter-container{
max-width:700px;
text-align:center;
position:relative;
}

.letter-container img{
width:100%;
border-radius:15px;
box-shadow:0 0 30px rgba(255,255,255,.2);
}

.message{
margin-top:25px;
font-size:28px;
color:white;
}

/* Floating hearts */
.heart{
position:fixed;
bottom:-20px;
color:#ff4d6d;
font-size:20px;
animation:float 8s linear infinite;
}

@keyframes float{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-110vh);
opacity:0;
}
}

/* PAGE 3 */
#page3{
display:none;
background:black;
color:white;
text-align:center;
}

.big-heart{
font-size:150px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.2);
}
}

.final-text{
font-size:35px;
max-width:700px;
padding:20px;
}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="page" id="page1">

<div class="chibi">🥺❤️🥰</div>

<h1>Tasnim, Do You Love Me? ❤️</h1>

<div class="buttons">
<button id="yesBtn">YES 💖</button>
<button id="noBtn">NO 😢</button>
</div>

</div>

<!-- PAGE 2 -->
<div class="page" id="page2">

<div class="letter-container">

<img src="letter.jpg" alt="Love Letter">

<div class="message">
Every word here comes from my heart ❤️
<br><br>

<button onclick="showPage3()">
One More Thing 💌
</button>

</div>

</div>

</div>

<!-- PAGE 3 -->
<div class="page" id="page3">

<div class="big-heart">❤️</div>

<div class="final-text">
Thank you for being part of my life.
<br><br>
No matter how far apart we are,
you will always have a special place in my heart.
<br><br>
Forever Yours ❤️
</div>

</div>

<script>

// YES BUTTON
document.getElementById("yesBtn").onclick = () => {
document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="flex";
};

// DODGE NO BUTTON
const noBtn = document.getElementById("noBtn");

function moveButton(){
const x = Math.random() * (window.innerWidth - 150);
const y = Math.random() * (window.innerHeight - 100);

noBtn.style.position="absolute";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("click",moveButton);

// PAGE 3
function showPage3(){
document.getElementById("page2").style.display="none";
document.getElementById("page3").style.display="flex";
}

// FLOATING HEARTS
function createHeart(){
const heart=document.createElement("div");

heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
